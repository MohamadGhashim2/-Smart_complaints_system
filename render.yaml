services:
  - type: web
    name: smart-complaints-api
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "smart-complaints-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-domain.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://smart-complaints-api.onrender.com,https://your-frontend-domain.vercel.app"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smart-complaints-db
          property: connectionString

databases:
  - name: smart-complaints-db
    plan: free